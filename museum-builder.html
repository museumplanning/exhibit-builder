<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Museum Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0c0c0e;--surface:#111116;--border:rgba(255,255,255,0.07);
      --border-hi:rgba(255,255,255,0.18);--text:#e8e8ec;
      --dim:rgba(232,232,236,0.38);--mid:rgba(232,232,236,0.62);
      --accent:#c8a96e;--adim:rgba(200,169,110,0.15);--aglow:rgba(200,169,110,0.08);
      --red:#e05a4a;--mono:'DM Mono',monospace;--serif:'Cormorant Garamond',serif;
    }
    html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden;}
    .app{display:grid;grid-template-columns:370px 1fr;grid-template-rows:52px 1fr;height:100vh;}

    header{grid-column:1/-1;padding:0 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--bg);}
    .h-eye{font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--accent);}
    .h-ttl{font-family:var(--serif);font-size:21px;font-weight:300;font-style:italic;}
    .h-rule{flex:1;height:1px;background:var(--border);}
    .h-hint{font-size:10px;color:var(--dim);letter-spacing:.07em;}

    .panel-left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .ph{padding:9px 16px 7px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .pl{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);}
    .ha{display:flex;gap:7px;align-items:center;}
    .sc{font-size:9px;color:var(--accent);background:var(--adim);padding:3px 8px;border-radius:2px;}
    .nb{background:none;border:1px solid rgba(224,90,74,0.3);border-radius:2px;color:rgba(224,90,74,0.6);font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:3px 8px;cursor:pointer;transition:all .2s;}
    .nb:hover{border-color:var(--red);color:var(--red);background:rgba(224,90,74,0.08);}

    .sa{padding:9px 16px 9px;flex-shrink:0;border-bottom:1px solid var(--border);}
    .sr{display:flex;gap:7px;margin-bottom:7px;align-items:flex-end;}
    .sg{display:flex;flex-direction:column;gap:3px;flex:1;}
    .sl{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);}
    .si{background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--mid);font-family:var(--mono);font-size:11px;padding:5px 7px;outline:none;transition:border-color .2s;width:100%;}
    .si:focus{border-color:var(--border-hi);color:var(--text);}
    .unit{font-size:8px;color:var(--dim);margin-left:2px;}
    .mr{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
    .mb{flex:1;background:none;border:none;color:var(--dim);font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;padding:6px 3px;cursor:pointer;transition:all .2s;text-align:center;}
    .mb.active{background:var(--adim);color:var(--accent);}
    .mb:not(:last-child){border-right:1px solid var(--border);}

    .ca{padding:7px 16px 0;flex-shrink:0;}
    .cl{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:4px;display:block;}
    .ci{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--mid);font-family:var(--mono);font-size:11px;line-height:1.5;padding:6px 9px;resize:none;outline:none;transition:border-color .2s;height:44px;}
    .ci:focus{border-color:var(--border-hi);color:var(--text);}
    .ci::placeholder{color:rgba(232,232,236,0.18);}

    .os{flex:1;overflow-y:auto;padding:7px 16px;}
    .os::-webkit-scrollbar{width:3px;}
    .os::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}
    .oi{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
    .in{font-size:9px;color:var(--accent);width:15px;flex-shrink:0;text-align:right;}
    .ii{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11.5px;padding:4px 0 4px 5px;outline:none;transition:border-color .15s,background .15s;}
    .ii:focus{border-bottom-color:var(--accent);background:var(--aglow);padding-left:8px;}
    .ii::placeholder{color:rgba(232,232,236,0.16);}
    .sb2{font-size:7px;letter-spacing:.08em;padding:2px 4px;border-radius:2px;flex-shrink:0;text-transform:uppercase;}
    .sb2.wall{background:rgba(68,136,255,0.12);color:rgba(68,136,255,0.7);}
    .sb2.table{background:rgba(90,170,122,0.12);color:rgba(90,170,122,0.7);}
    .sb2.video{background:rgba(200,169,110,0.12);color:rgba(200,169,110,0.7);}
    .sb2.screen{background:rgba(180,80,255,0.12);color:rgba(180,80,255,0.7);}
    .id{width:15px;height:15px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:rgba(224,90,74,0);font-size:13px;transition:color .15s;flex-shrink:0;}
    .oi:hover .id{color:rgba(224,90,74,0.4);}
    .id:hover{color:var(--red)!important;}

    .ar{padding:4px 16px 6px;flex-shrink:0;}
    .ab{width:100%;background:none;border:1px dashed var(--border);border-radius:3px;color:var(--dim);font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:6px;cursor:pointer;transition:all .2s;}
    .ab:hover{border-color:var(--accent);color:var(--accent);background:var(--adim);}

    .ga{padding:7px 16px 13px;border-top:1px solid var(--border);flex-shrink:0;}
    .gb{width:100%;background:var(--accent);border:none;border-radius:3px;color:#0c0c0e;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;padding:11px;cursor:pointer;transition:opacity .2s,transform .1s;}
    .gb:hover{opacity:.88;} .gb:active{transform:scale(.99);} .gb:disabled{opacity:.4;cursor:not-allowed;}
    .sp{display:none;width:11px;height:11px;border:1.5px solid rgba(12,12,14,.3);border-top-color:rgba(12,12,14,.9);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle;}
    .gb.loading .sp{display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .panel-right{position:relative;overflow:hidden;background:#000;}
    #mf{width:100%;height:100%;border:none;display:block;}
    .fo{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(12,12,14,0.95);transition:opacity .5s;}
    .fo.hidden{opacity:0;pointer-events:none;}
    .fi{font-size:32px;opacity:.2;}
    .ft{font-family:var(--serif);font-size:19px;font-style:italic;font-weight:300;color:rgba(232,232,236,0.4);}
    .fs{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(232,232,236,0.2);}
    .stb{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(12,12,14,0.88);border:1px solid var(--border);border-radius:3px;padding:5px 14px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);backdrop-filter:blur(8px);opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap;}
    .stb.visible{opacity:1;}

    .co2{position:fixed;inset:0;background:rgba(12,12,14,0.78);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
    .co2.visible{opacity:1;pointer-events:all;}
    .cb{background:var(--surface);border:1px solid var(--border-hi);border-radius:5px;padding:24px 28px;max-width:300px;text-align:center;}
    .ct{font-family:var(--serif);font-size:20px;font-style:italic;margin-bottom:8px;}
    .cs{font-size:11px;color:var(--dim);line-height:1.6;margin-bottom:18px;}
    .cbts{display:flex;gap:9px;justify-content:center;}
    .cc2{background:none;border:1px solid var(--border);border-radius:3px;color:var(--dim);font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all .15s;}
    .cc2:hover{border-color:var(--border-hi);color:var(--text);}
    .ck{background:var(--red);border:none;border-radius:3px;color:#fff;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:7px 14px;cursor:pointer;}
    .ck:hover{opacity:.85;}
  </style>
</head>
<body>
<div class="app">
  <header>
    <span class="h-eye">Museum OS</span>
    <span class="h-ttl">Exhibit Builder</span>
    <div class="h-rule"></div>
    <span class="h-hint" id="h-hint">6 wall screens · 6 exhibit tables · 3 video tables</span>
  </header>

  <div class="panel-left">
    <div class="ph">
      <span class="pl">Outline</span>
      <div class="ha">
        <span class="sc" id="slot-count">0 / 15</span>
        <button class="nb" id="new-btn">New Museum</button>
      </div>
    </div>

    <div class="sa">
      <div class="sr">
        <div class="sg" style="flex:2">
          <span class="sl">Mode</span>
          <div class="mr" id="mode-row">
            <button class="mb active" data-mode="museum">Museum Hall</button>
            <button class="mb" data-mode="imm4">4-Wall Immersive</button>
            <button class="mb" data-mode="imm6">6-Surface</button>
          </div>
        </div>
      </div>
      <div class="sr">
        <div class="sg"><span class="sl">Width <span class="unit">ft</span></span><input class="si" id="dw" type="number" value="68" min="8" max="300" step="2"></div>
        <div class="sg"><span class="sl">Length <span class="unit">ft</span></span><input class="si" id="dl" type="number" value="68" min="8" max="300" step="2"></div>
        <div class="sg"><span class="sl">Height <span class="unit">ft</span></span><input class="si" id="dh" type="number" value="13" min="7" max="50" step="1"></div>
      </div>
    </div>

    <div class="ca">
      <label class="cl" for="ctx">Museum Context</label>
      <textarea class="ci" id="ctx" placeholder="e.g. Local history museum in Burlington, Vermont — Abenaki heritage, colonial settlement, 19th-century industry."></textarea>
    </div>

    <div class="os" id="outline-list"></div>

    <div class="ar"><button class="ab" id="add-btn">+ Add Topic</button></div>

    <div class="ga">
      <button class="gb" id="gen-btn">
        <span class="sp"></span>
        <span class="bt">Generate &amp; Preview</span>
      </button>
    </div>
  </div>

  <div class="panel-right">
    <iframe id="mf" title="Preview"></iframe>
    <div class="fo" id="fo">
      <div class="fi">◈</div>
      <div class="ft">Museum Preview</div>
      <div class="fs">Add topics and generate to preview</div>
    </div>
    <div class="stb" id="stb">Loading…</div>
  </div>
</div>

<div class="co2" id="confirm-overlay">
  <div class="cb">
    <div class="ct">Start Fresh?</div>
    <div class="cs">Clear all current topics and reset the outline to empty slots.</div>
    <div class="cbts">
      <button class="cc2" id="cc">Cancel</button>
      <button class="ck" id="ck">Clear All</button>
    </div>
  </div>
</div>

function b64decode(s) {
  const bin = atob(s);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

// ── STATE ─────────────────────────────────────────────────────────
let mode = 'museum';
let topics = Array(15).fill('');

function getSlots() { return mode==='imm4'?IMM4_SLOTS:mode==='imm6'?IMM6_SLOTS:MUSEUM_SLOTS; }
function getMax()   { return mode==='imm4'?4:mode==='imm6'?6:15; }
function getDims()  { return mode==='museum'?{w:68,l:68,h:13}:mode==='imm4'?{w:20,l:20,h:10}:{w:16,l:16,h:10}; }

// ── MODE SWITCH ───────────────────────────────────────────────────
document.querySelectorAll('.mb').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('.mb').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const d=getDims();
    document.getElementById('dw').value=d.w;
    document.getElementById('dl').value=d.l;
    document.getElementById('dh').value=d.h;
    const max=getMax();
    topics=topics.slice(0,max);
    while(topics.length<max) topics.push('');
    const hints={museum:'6 wall screens · 6 exhibit tables · 3 video tables',imm4:'4-wall immersive room · drag to look around',imm6:'6-surface immersive cube · all walls, floor & ceiling'};
    document.getElementById('h-hint').textContent=hints[mode];
    renderOutline();
  });
});

// ── OUTLINE ───────────────────────────────────────────────────────
function renderOutline() {
  const list = document.getElementById('outline-list');
  list.innerHTML = '';
  const slots = getSlots();
  topics.forEach((topic, i) => {
    const slot = slots[i]||null;
    const div = document.createElement('div');
    div.className = 'oi';
    div.innerHTML = `
      <span class="in">${i+1}</span>
      <input class="ii" type="text" value="${topic.replace(/"/g,'&quot;')}" placeholder="${slot?slot.label:'Topic'}…" data-idx="${i}">
      <span class="sb2 ${slot?slot.type:'wall'}">${slot?slot.type:'—'}</span>
      <button class="id" data-idx="${i}">×</button>
    `;
    list.appendChild(div);
  });
  list.querySelectorAll('.ii').forEach(inp => {
    inp.addEventListener('input', e=>{ topics[+e.target.dataset.idx]=e.target.value; updateCount(); });
    inp.addEventListener('keydown', e=>{
      const idx=+e.target.dataset.idx;
      if(e.key==='Enter'&&idx<topics.length-1) setTimeout(()=>list.querySelectorAll('.ii')[idx+1]?.focus(),0);
    });
  });
  // Event delegation so X buttons work reliably
  list.addEventListener('click', e=>{
    const btn = e.target.closest('.id');
    if(!btn) return;
    const idx = +btn.dataset.idx;
    topics.splice(idx, 1);
    renderOutline();
  });
  updateCount();
}
function updateCount() {
  document.getElementById('slot-count').textContent=topics.filter(t=>t.trim()).length+' / '+getMax();
}

// ── ADD ───────────────────────────────────────────────────────────
document.getElementById('add-btn').addEventListener('click',()=>{
  topics.push(''); renderOutline();
  setTimeout(()=>{const i=document.querySelectorAll('.ii');i[i.length-1]?.focus();},50);
});

// ── NEW MUSEUM ────────────────────────────────────────────────────
document.getElementById('new-btn').addEventListener('click',()=>document.getElementById('confirm-overlay').classList.add('visible'));
document.getElementById('cc').addEventListener('click',()=>document.getElementById('confirm-overlay').classList.remove('visible'));
document.getElementById('ck').addEventListener('click',()=>{
  const max = getMax();
  topics = [];
  for(let i=0;i<max;i++) topics.push('');
  document.getElementById('ctx').value='';
  document.getElementById('confirm-overlay').classList.remove('visible');
  document.getElementById('mf').srcdoc='';
  document.getElementById('fo').classList.remove('hidden');
  renderOutline();
});

// ── STATUS ────────────────────────────────────────────────────────
let statusTimer;
function showStatus(msg,dur=2800){
  clearTimeout(statusTimer);
  const b=document.getElementById('stb'); b.textContent=msg; b.classList.add('visible');
  if(dur) statusTimer=setTimeout(()=>b.classList.remove('visible'),dur);
}

// ── ESC helper ────────────────────────────────────────────────────
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');}

// ── INJECT & BUILD ────────────────────────────────────────────────
function buildMuseum(exhibits, W, H, L){
  let html = b64decode(MUSEUM_B64);
  const walls  = exhibits.filter((_,i)=>MUSEUM_SLOTS[i]?.type==='wall');
  const tables = exhibits.filter((_,i)=>MUSEUM_SLOTS[i]?.type==='table');
  const videos = exhibits.filter((_,i)=>MUSEUM_SLOTS[i]?.type==='video');

  const eJS = walls.map((ex,i)=>
    `  { ${MUSEUM_SLOTS[i]?.pos||"wall:'left',pos:0"}, title:'${esc(ex.title)}', period:'${esc(ex.period)}', screenBg:'${ex.screenBg}', accentColor:${ex.accentColor||0x888888}, desc:'${esc(ex.desc)}' }`
  ).join(',\n');
  const tJS = tables.map((ex,i)=>
    `  { ${MUSEUM_SLOTS[i+6]?.pos||'x:0,z:0'}, title:'${esc(ex.title)}', bg:'${ex.screenBg}', accent:${ex.accentColor||0x888888} }`
  ).join(',\n');
  const vJS = videos.map((ex,i)=>
    `  { ${MUSEUM_SLOTS[i+12]?.pos||'x:0,z:0'}, title:'${esc(ex.title)}', bg:'${ex.screenBg}' }`
  ).join(',\n');

  html = html.replace('/*HALL_W*/68', String(W));
  html = html.replace('/*HALL_H*/13', String(H));
  html = html.replace('/*HALL_L*/68', String(L));
  html = html.replace('/*EXHIBITS_PLACEHOLDER*/[]',      `[\n${eJS}\n]`);
  html = html.replace('/*TABLE_CONFIGS_PLACEHOLDER*/[]', `[\n${vJS}\n]`);
  html = html.replace('/*EXHIBIT_TABLES_PLACEHOLDER*/[]',`[\n${tJS}\n]`);
  return html;
}

function buildImmersive(exhibits, W, H, L, six){
  let html = b64decode(IMMERSIVE_B64);
  const eJS = exhibits.map(ex=>
    `{ title:'${esc(ex.title)}', period:'${esc(ex.period)}', desc:'${esc(ex.desc)}', screenBg:'${ex.screenBg}', accentColor:${ex.accentColor||0x4488ff} }`
  ).join(',\n');
  html = html.replace('/*HALL_W*/20', String(W));
  html = html.replace('/*HALL_H*/10', String(H));
  html = html.replace('/*HALL_L*/20', String(L));
  html = html.replace('/*SURFACES_6*/false', six?'true':'false');
  html = html.replace('/*EXHIBITS_PLACEHOLDER*/[]', `[\n${eJS}\n]`);
  return html;
}

// ── GENERATE ─────────────────────────────────────────────────────
document.getElementById('gen-btn').addEventListener('click', generate);

async function generate(){
  const filled = topics.filter(t=>t.trim());
  if(!filled.length){showStatus('Add at least one topic first');return;}

  const btn=document.getElementById('gen-btn');
  btn.disabled=true; btn.classList.add('loading');
  btn.querySelector('.bt').textContent='Generating exhibits…';
  showStatus('Calling Claude…',0);

  const ctx=document.getElementById('ctx').value.trim();
  const slots=getSlots();
  const slotList=filled.map((t,i)=>{
    const s=slots[i]; return `Slot ${i+1} (${s?s.label+', '+s.type:'extra'}): "${t}"`;
  }).join('\n');

  const modeDesc=mode==='museum'?'a natural history / local history museum hall with wall screens and exhibit tables'
    :mode==='imm4'?'a small 4-wall immersive projection room (teamLab-style) where visitors stand in the center surrounded by screens'
    :'a 6-surface immersive cube room where all walls, floor, and ceiling are screens';

  const prompt=`Generate exhibit data for ${modeDesc}.
${ctx?'Museum context: '+ctx+'\n':''}
Slots to fill:
${slotList}

For each slot return a JSON object with:
- title: 3-6 word striking title
- period: time period or theme label  
- desc: 2-3 evocative sentences for visitors
- screenBg: dark hex color matching the topic mood (e.g. deep ocean="#00080f", volcanic="#1a0200", cosmic="#00000f")
- accentColor: JS hex integer like 0x4488ff

Return ONLY a raw JSON array. No markdown, no backticks, no explanation.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const raw=data.content.map(b=>b.text||'').join('').trim();
    let exhibits;
    try{exhibits=JSON.parse(raw);}
    catch{const m=raw.match(/\[[\s\S]*\]/);if(m)exhibits=JSON.parse(m[0]);else throw new Error('Could not parse Claude response');}

    const max=getMax();
    while(exhibits.length<max) exhibits.push({title:'Exhibit',period:'',desc:'',screenBg:'#0a0a0a',accentColor:0x888888});

    const W=+document.getElementById('dw').value||68;
    const H=+document.getElementById('dh').value||13;
    const L=+document.getElementById('dl').value||68;

    showStatus('Building environment…',0);
    const html = mode==='museum' ? buildMuseum(exhibits,W,H,L) : buildImmersive(exhibits,W,H,L,mode==='imm6');

    document.getElementById('mf').srcdoc=html;
    document.getElementById('fo').classList.add('hidden');
    const msgs={museum:'Museum loaded — guided tour starts automatically',imm4:'Immersive room loaded — drag to look around',imm6:'6-surface cube loaded — drag to explore all surfaces'};
    showStatus(msgs[mode],5000);

  }catch(err){
    showStatus('Error: '+err.message,7000);
  }finally{
    btn.disabled=false;btn.classList.remove('loading');
    btn.querySelector('.bt').textContent='Generate & Preview';
  }
}

// ── INIT ──────────────────────────────────────────────────────────
renderOutline();
</script>
